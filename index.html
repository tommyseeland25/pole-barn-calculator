<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Pole Barn Calculator</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
    </head>
    <body>
        <div class="card">
            <h1>Pole Barn Calculator</h1>

            <div class="field-grid">
            <div class="field">
                <label>Width (ft)</label>
                <input type="number" id="width" placeholder="e.g. 24">
            </div>
            <div class="field">
                <label>Length (ft)</label>
                <input type="number" id="length" placeholder="e.g. 40">
            </div>
            <div class="field">
                <label>Wall height (ft)</label>
                <input type="number" id="height" placeholder="e.g. 10">
            </div>
            <div class="field">
                <label>Roof pitch (x/12)</label>
                <input type="number" id="roofPitch" placeholder="e.g. 4">
            </div>
            <div class="field">
                <label>Truss spacing (ft)</label>
                <input type="number" id="trussSpacing" placeholder="e.g. 2">
            </div>
            </div>

            <button id="calculatorBtn">Calculate</button>

            <div id="results"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
